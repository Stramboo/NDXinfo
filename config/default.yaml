# 默认应用配置（ndxinfo trader）
# 所有字段都可被环境变量覆盖：前缀 NDX_，分隔符 "__"
# 例：NDX_RISK__STOP_LOSS_PCT=-0.10 python trader.py

broker:
  type: simulation
  initial_cash: 100000.0
  paper: true

risk:
  max_position_pct: 0.25
  stop_loss_pct: -8.0
  trailing_stop_pct: -5.0
  max_daily_trades: 20
  cooldown_seconds: 60
  atr_multiple: 2.0
  atr_period: 14
  use_atr_stop: false

monitor:
  symbols: [NVDA, AAPL, MSFT, GOOGL, AMZN, TSLA, META, SPY, QQQ]
  refresh_interval: 30

indicators:
  ma_periods: [5, 10, 20, 60]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  boll_period: 20
  boll_std: 2.0

sim_rules:
  commission_per_share: 0.0
  min_commission: 0.0
  slippage_bps: 0.0
  fill_delay_ms: 0
  partial_fill_chance: 0.0
  t_plus_one: false
  market_hours_only: false

strategies:
  name: multi
  multi:
    weights: { macd: 0.30, rsi: 0.25, ma: 0.25, boll: 0.20 }

notify_level: info
log_dir: logs
log_json: false
